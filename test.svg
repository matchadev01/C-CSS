/* === 脈動條 heatbar === */
.heatbar {
  background: #0003;
  overflow: hidden;
  text-align: center;
  padding: 15px 12px;
  border: 2.5px dotted #C66;
  border-radius: 24px;
  filter: blur(1px);
  position: relative;
}

.heatbar-glow {
  animation: tada 1s infinite alternate;
  position: absolute;
  z-index: -1;
  top: -25%;
  bottom: -50%;
  right: -10%;
  left: 60%;
  filter: blur(9px);
  border-radius: 42%;
  background: radial-gradient(circle at left, #0000 12%, #FFF);
}

.heatbar-track {
  height: 50px;
  background: #F87;
  border-radius: 5px 15px 15px 5px / 5px 50% 50% 5px;
  box-shadow: inset 0 0 10px #F33;
}

.heatbar-fill {
  animation: loading 0.2s infinite alternate;
  height: 100%;
  filter: blur(3px);
  border-radius: 0 9px 9px 0 / 0 46% 46% 0;
  background: linear-gradient(90deg, #622, #C66 12%, #C66 60%, #F33 95%);
  box-shadow: inset 0 0 36px #622;
}

@keyframes loading {
  from { opacity: 0.7; transform: scaleX(0.98); }
  to   { opacity: 1;   transform: scaleX(1); }
}

@keyframes tada {
  from { transform: scale(1) rotate(0deg); opacity: 0.6; }
  to   { transform: scale(1.05) rotate(2deg); opacity: 1; }
}
